
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: edutrack
      POSTGRES_PASSWORD: edutrack
      POSTGRES_DB: edutrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edutrack -d edutrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  uploads_data:
